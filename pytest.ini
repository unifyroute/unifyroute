[pytest]
# ──────────────────────────────────────────────────────────────────
# pytest.ini – UnifyRouter API Gateway Test Suite
# ──────────────────────────────────────────────────────────────────

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Do not recurse into package source trees
norecursedirs = .venv brain/src router/src shared/src api-gateway/src launcher quota-poller

# Asyncio mode (for any future async tests)
asyncio_mode = auto

# Markers
markers =
    integration: marks tests as integration tests that require a live server
    slow: marks tests as slow (use -m "not slow" to skip)

# Verbosity
addopts =
    --tb=short
    -v
    --strict-markers
    -p no:warnings
